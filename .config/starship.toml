"$schema" = 'https://starship.rs/config-schema.json'

# в”Җв”Җв”Җ Starship вҖ” Catppuccin Mocha Kapseln в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Jedes Modul ist eine eigene abgerundete Kapsel. Leere Module
# rendern gar nicht. Braucht eine Nerd Font (CaskaydiaCove NF).
# Generiert via gen_starship.py (Unicode-Escapes fuer die Glyphen).

add_newline = true
palette = 'catppuccin_mocha'

format = """
$username\
$directory\
$git_branch\
$git_status\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$python\
$java\
$kotlin\
$php\
$dotnet\
$cmd_duration\
$line_break$character"""

# Rechtsbuendig auf der ersten Zeile
right_format = "$time"

[username]
show_always = false
style_user = "bg:mauve fg:crust"
style_root = "bg:red fg:crust"
format = "[оӮ¶](fg:mauve)[$user]($style)[оӮҙ](fg:mauve) "

[directory]
style = "bg:blue fg:crust"
read_only = " у°Ңҫ"
read_only_style = "bg:blue fg:crust"
format = "[оӮ¶](fg:blue)[$path]($style)[$read_only]($read_only_style)[оӮҙ](fg:blue) "
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"~" = "у°Ӣң"
"Dokumente" = "у°Ҳҷ"
"Downloads" = "пҖҷ"
"Musik" = "у°қҡ"
"Bilder" = "пҖҫ"
"Videos" = "пҖҪ"
"Documents" = "у°Ҳҷ"
"Music" = "у°қҡ"
"Pictures" = "пҖҫ"

[git_branch]
symbol = "оңҘ"
style = "bg:sapphire fg:crust"
format = "[оӮ¶](fg:sapphire)[$symbol $branch]($style)[оӮҙ](fg:sapphire) "

[git_status]
# Eigene Kapsel in Peach вҖ” erscheint nur, wenn es wirklich Status gibt
style = "bg:peach fg:crust"
format = "([оӮ¶](fg:peach)[$all_status$ahead_behind]($style)[оӮҙ](fg:peach) )"

[c]
symbol = "оҳһ"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $version)]($style)[оӮҙ](fg:teal) "

[cpp]
symbol = "оҳқ"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $version)]($style)[оӮҙ](fg:teal) "

[rust]
symbol = "оһЁ"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $version)]($style)[оӮҙ](fg:teal) "

[golang]
symbol = "оҳ§"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $version)]($style)[оӮҙ](fg:teal) "

[nodejs]
symbol = "оңҳ"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $version)]($style)[оӮҙ](fg:teal) "

[python]
symbol = "оңј"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $version)(\\($virtualenv\\))]($style)[оӮҙ](fg:teal) "

[java]
symbol = "оңё"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $version)]($style)[оӮҙ](fg:teal) "

[kotlin]
symbol = "оҳҙ"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $version)]($style)[оӮҙ](fg:teal) "

[php]
symbol = "оңҪ"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $version)]($style)[оӮҙ](fg:teal) "

[dotnet]
symbol = "у°Ә®"
style = "bg:teal fg:crust"
format = "[оӮ¶](fg:teal)[$symbol( $tfm)]($style)[оӮҙ](fg:teal) "

[cmd_duration]
min_time = 2000
style = "bg:surface0 fg:peach"
format = "[оӮ¶](fg:surface0)[уұҺ« $duration]($style)[оӮҙ](fg:surface0) "

[time]
disabled = false
time_format = "%H:%M"
style = "bg:surface0 fg:subtext0"
format = "[оӮ¶](fg:surface0)[пҖ— $time]($style)[оӮҙ](fg:surface0)"

[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"
vimcmd_symbol = "[вқ®](bold mauve)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
