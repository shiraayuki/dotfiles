# ═══════════════════════════════════════════════════════════════
#  HYPRLAND
#  Docs: https://wiki.hypr.land/Configuring/
# ═══════════════════════════════════════════════════════════════

# ─── Colors (active theme, switch with SUPER+SHIFT+T) ──────────
source = ~/.config/themes/current/hypr.conf

# ─── Monitors ──────────────────────────────────────────────────
# Acer XN253Q X — use the full 240 Hz
monitor = DP-3, 1920x1080@240, 0x0, 1
monitor = eDP-1, 2880x1920@120, 0x0, 2
# Fallback for everything else (e.g. projector)
monitor = , preferred, auto, 1

# ─── Programs ──────────────────────────────────────────────────
$terminal    = kitty --directory ~
$browser     = firefox
$fileManager = kitty --class yazi --directory ~ -e yazi
$menu        = cd ~ && rofi -show drun

# ─── Autostart ─────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = spotify    # lands on special:spotify via window rule
exec-once = wayvnc

# ─── Environment variables ─────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ─── Input ─────────────────────────────────────────────────────
input {
    kb_layout = de
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# ─── Look & Feel ───────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = $accent2 $accent 45deg
    col.inactive_border = $surface0
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 0.97

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = $shadow
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        popups = true
    }
}

animations {
    enabled = true

    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    bezier = snappy, 0.4, 0.0, 0.2, 1.0
    bezier = bounce, 0.68, -0.2, 0.27, 1.2

    animation = windows, 1, 4, bounce, popin 85%
    animation = windowsOut, 1, 4, smooth, popin 85%
    animation = border, 1, 6, smooth
    animation = fade, 1, 5, smooth
    animation = workspaces, 1, 4, snappy, slidefade 15%
    animation = specialWorkspace, 1, 4, snappy, slidefadevert 20%
    animation = layers, 1, 3, smooth, fade
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    focus_on_activate = true
}

# ─── Window rules ──────────────────────────────────────────────
# File manager (yazi) as a floating, centered window
windowrule = float true, size 1200 700, center true, match:class ^(yazi)$

# Picture-in-picture (Firefox) always on top
windowrule = float true, pin true, match:title ^(Bild-im-Bild|Picture-in-Picture)$

# Let dialogs float
windowrule = float true, match:title ^(Datei öffnen|Datei speichern|Open File|Save File|File Upload)(.*)$

# Spotify always lives on its scratchpad (SUPER+S)
windowrule = workspace special:spotify silent, match:class ^(Spotify)$

# ═══════════════════════════════════════════════════════════════
#  KEYBINDS
# ═══════════════════════════════════════════════════════════════
$mainMod = SUPER

# ─── Main keybinds (carried over from the old config) ──────────
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, Space, exec, $menu

# ─── Window management ─────────────────────────────────────────
bind = $mainMod, T, togglefloating,
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1          # Maximize (bar stays visible)
bind = $mainMod, R, layoutmsg, togglesplit
bind = $mainMod SHIFT, E, exit,

# Focus with mainMod + hjkl / arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows with mainMod + SHIFT + hjkl
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Resize windows with mainMod + CTRL + hjkl
binde = $mainMod CTRL, h, resizeactive, -40 0
binde = $mainMod CTRL, l, resizeactive, 40 0
binde = $mainMod CTRL, k, resizeactive, 0 -40
binde = $mainMod CTRL, j, resizeactive, 0 40

# Move/resize windows with the mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ─── Workspaces ────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Switch workspaces with the mouse wheel
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Scratchpad
bind = $mainMod, N, togglespecialworkspace, magic
bind = $mainMod SHIFT, N, movetoworkspace, special:magic

# Spotify scratchpad (Spotify autostarts there, see exec-once + window rules)
bind = $mainMod, S, togglespecialworkspace, spotify

# ─── Tools ─────────────────────────────────────────────────────
# Screenshots
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy && notify-send -a Screenshot "Screenshot" "Region copied to clipboard"
bind = SHIFT, Print, exec, grim -g "$(slurp -d)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send -a Screenshot "Screenshot" "Saved to ~/Pictures/Screenshots"
bind = $mainMod, Print, exec, grim - | wl-copy && notify-send -a Screenshot "Screenshot" "Full screen copied"
bind = $mainMod SHIFT, Print, exec, grim ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send -a Screenshot "Screenshot" "Full screen saved"

# Clipboard history
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "󰅍 Clipboard" | cliphist decode | wl-copy

# Color picker
bind = $mainMod SHIFT, I, exec, hyprpicker -a && notify-send -a "Color picker" "Color copied" "$(wl-paste)"

# Lock & power menu
bind = $mainMod, Escape, exec, hyprlock
bind = $mainMod SHIFT, Escape, exec, ~/.config/hypr/scripts/powermenu.sh

# Notification center
bind = $mainMod, D, exec, swaync-client -t -sw

# Theme switcher
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/theme-switch.sh

# Restart waybar
bind = $mainMod SHIFT, B, exec, killall waybar; waybar &

# ─── Media & function keys ─────────────────────────────────────
# Volume without media keys: SUPER + plus/minus, mute: SUPER+SHIFT+M
bindel = $mainMod, plus, exec, pamixer -i 5
bindel = $mainMod, minus, exec, pamixer -d 5
bindl  = $mainMod SHIFT, M, exec, pamixer -t

bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = , XF86AudioMute, exec, pamixer -t
bindl  = , XF86AudioMicMute, exec, pamixer --default-source -t
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
