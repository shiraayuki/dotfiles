# ─── Hyprlock — Farben kommen vom aktiven Theme ────────────────
source = ~/.config/themes/current/hyprlock.conf

general {
    hide_cursor = true
    grace = 3
}

background {
    monitor =
    path = $wallpaper
    blur_passes = 3
    blur_size = 6
    brightness = 0.6
}

# Uhrzeit
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $text
    font_size = 90
    font_family = CaskaydiaCove Nerd Font Bold
    position = 0, 220
    halign = center
    valign = center
}

# Datum
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d. %B %Y')"
    color = $accent2
    font_size = 20
    font_family = CaskaydiaCove Nerd Font
    position = 0, 130
    halign = center
    valign = center
}

# Passwortfeld
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = $accent
    inner_color = $base
    font_color = $text
    fade_on_empty = false
    placeholder_text = <span foreground="##$overlayHex">Passwort…</span>
    check_color = $yellow
    fail_color = $red
    fail_text = <i>Falsch ($ATTEMPTS)</i>
    rounding = 14
    position = 0, -40
    halign = center
    valign = center
}
